name: preview.yml
on:
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write


jobs:
  build:
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: true
      AWS_REGION: auto
      AWS_CLI_FILE_ENCODING: UTF-8
      AWS_DEFAULT_S3_SIGNATURE_VERSION: s3v4
      S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short HEAD)
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV

      - name: change plugin.yml version
        run: |
          before="$GITHUB_ENV"
          after="${before//v/}"
          sed -i 's/VersionPlaceholder/$after/' ./gradle.properties

      - name: Configure docs base path for preview
        run: |
          # プレビューはサブパス配信のため basePath を設定する
          echo "BASE_PATH=/asf/${{ env.COMMIT_SHORT_SHA }}/docs" >> $GITHUB_ENV

      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install


      - name: Build docs (Fumadocs)
        working-directory: docs
        env:
          BASE_PATH: ${{ env.BASE_PATH }}
        run: pnpm run build

      - name: Build with Gradle
        continue-on-error: true
        run: ./gradlew build

      - name: Upload build artifacts
        id: upload-artifacts
        run: |
          mkdir -p ./upload
          mkdir -p ./upload/jars
          mv ./build/libs/*-all.jar ./upload/jars/AdvancedShopFinder-bukkit-${{ env.COMMIT_SHORT_SHA }}.jar
          mkdir -p ./upload/docs
          cp -r ./docs/out/* ./upload/docs/
          # CRC32チェックサムアルゴリズムを使用してS3互換エンドポイントとの互換性を確保
          aws s3 cp ./upload --endpoint-url ${S3_ENDPOINT} s3://${{ env.S3_UPLOAD_BUCKET }}/asf/${{ env.COMMIT_SHORT_SHA }} --recursive --checksum-algorithm=CRC32 || echo "S3 upload completed with warnings"


      - name: Get limit time
        id: limit-time
        run: |
          limit_time=$(date -d "7 days" +%Y-%m-%d)
          echo "LIMIT_TIME=$limit_time" >> $GITHUB_ENV

      - name: Create comment file
        id: create-comment-file
        env:
          ARTIFACT_URL: "https://mp-ci.nikomaru.dev/asf/${{ env.COMMIT_SHORT_SHA }}/jars/AdvancedShopFinder-bukkit-${{ env.COMMIT_SHORT_SHA }}.jar"
          DOCS_PREVIEW_URL: "https://mp-ci.nikomaru.dev/asf/${{ env.COMMIT_SHORT_SHA }}/docs/index.html"
          LIMIT_TIME: ${{ env.LIMIT_TIME }}
        run: |
          cat  << EOF > comment.md
          ## 🚀 Preview of ${{ github.event.repository.name }}
          This preview file are availalble for 7 days. (until $LIMIT_TIME)
          <table>
            <tr>
              <th scope="row">📖 Documentation Preview</th>
              <td><a href="$DOCS_PREVIEW_URL">$DOCS_PREVIEW_URL</a></td>
            </tr>
            <tr>
              <th scope="row">📦 Preview Jars Bukkit</th>
              <td><a href="$ARTIFACT_URL">$ARTIFACT_URL</a></td>
            </tr>
          </table>
          EOF

      - name: Create PR comment
        if: ${{ job.status == 'success' && (github.event.action == 'opened' || github.event.action == 'synchronize') }}
        run: gh pr comment ${{ github.event.number }} --body-file comment.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}